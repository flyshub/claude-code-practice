# 把 Astro 静态站部署到 GitHub Pages
# 触发：push 到 main 分支，或在 Actions 页手动运行
# 前提（在 GitHub 仓库设置里做一次）：Settings → Pages → Source 选 "GitHub Actions"
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages 部署需要的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同时只跑一个部署，避免冲突
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建
        run: npm run build
        env:
          ASTRO_TELEMETRY_DISABLED: true

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
